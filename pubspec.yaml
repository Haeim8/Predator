name: predator
description: "Application de sécurité publique - Alertes zones sensibles en Europe"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.12.1
  cloud_firestore: ^5.6.6
  firebase_messaging: ^15.2.5
  firebase_analytics: ^11.4.5

  # Google Maps & Location
  google_maps_flutter: ^2.12.1
  geolocator: ^14.0.0
  geocoding: ^3.0.0

  # State Management
  provider: ^6.1.4

  # UI
  smooth_page_indicator: ^1.2.0+3
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1

  # Storage local (cache)
  shared_preferences: ^2.5.3

  # Ads
  google_mobile_ads: ^6.0.0

  # Utils
  url_launcher: ^6.3.1
  intl: ^0.20.2
  uuid: ^4.5.1
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Rajdhani
      fonts:
        - asset: fonts/Rajdhani-Regular.ttf
        - asset: fonts/Rajdhani-Medium.ttf
          weight: 500
        - asset: fonts/Rajdhani-SemiBold.ttf
          weight: 600
        - asset: fonts/Rajdhani-Bold.ttf
          weight: 700
